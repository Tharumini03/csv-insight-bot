{% extends "base.html" %}
{% block content %}

<div class="mt-10 max-w-xl mx-auto">
  <h1 class="text-3xl font-extrabold">Configure Analysis</h1>
  <p class="text-slate-300 mt-2">Select the target column and model to use.</p>

  <form action="/analyze" method="post" class="mt-8 space-y-6">
    <input type="hidden" name="file_id" value="{{ file_id }}">

    <div>
      <label class="block text-sm font-semibold text-slate-200 mb-2">Target column</label>
      <select name="target"
              class="w-full rounded-xl bg-white/5 border border-white/10 px-4 py-3 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        {% for col in columns %}
          <option value="{{ col }}">{{ col }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-semibold text-slate-200 mb-2">Model</label>
      <select name="model_choice"
              class="w-full rounded-xl bg-white/5 border border-white/10 px-4 py-3 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="rf">Random Forest</option>
        <option value="lr">Logistic / Linear Regression</option>
        <option value="gb">Gradient Boosting</option>
      </select>
    </div>

    <button type="submit"
            class="w-full py-3 rounded-xl bg-indigo-500 hover:bg-indigo-400 font-semibold text-white transition">
      Run analysis
    </button>
  </form>
</div>

{% endblock %}
