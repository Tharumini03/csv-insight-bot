<div class="mt-6 rounded-3xl border border-white/10 bg-white/5 p-6">
  <h2 class="text-lg font-bold">Chat Answer</h2>

  <div class="mt-4">
    <p class="text-sm text-slate-400"><b>You asked:</b></p>
    <p class="mt-1 text-slate-200">{{ question }}</p>
  </div>

  <div class="mt-4">
    <p class="text-sm text-slate-400"><b>Answer:</b></p>
    <div class="mt-2 rounded-2xl border border-white/10 bg-slate-950/40 p-4 text-slate-100 whitespace-pre-wrap">
      {{ answer }}
    </div>
  </div>

  {% if sources %}
    <div class="mt-4">
      <p class="text-sm text-slate-400"><b>Retrieved Chunks Used:</b></p>
      <ul class="mt-2 space-y-3">
        {% for s in sources %}
          <li class="rounded-2xl border border-white/10 bg-slate-950/40 p-4">
            <p class="text-xs text-slate-400">Chunk {{ s.chunk_id }} • Distance {{ "%.4f"|format(s.score) }}</p>
            <p class="mt-2 text-sm text-slate-200 whitespace-pre-wrap">{{ s.text }}</p>
          </li>
        {% endfor %}
      </ul>
    </div>
  {% endif %}
</div>
