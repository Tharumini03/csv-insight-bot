<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title if title else "CSV Insight Bot" }}</title>

  <!-- Tailwind CDN (no install) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Nice font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    html, body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  </style>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen">
  <!-- Top gradient glow -->
  <div class="absolute inset-x-0 -top-40 h-96 bg-gradient-to-r from-indigo-600/30 via-fuchsia-600/20 to-cyan-500/20 blur-3xl pointer-events-none"></div>

  <!-- Navbar -->
  <header class="relative z-10">
    <div class="max-w-6xl mx-auto px-4 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-2xl bg-white/10 border border-white/10 flex items-center justify-center">
          <span class="text-xl">🧠</span>
        </div>
        <div>
          <div class="font-bold leading-tight">CSV Insight Bot</div>
          <div class="text-xs text-slate-300">Agentic data analysis website</div>
        </div>
      </div>

      <a href="/" class="text-sm px-4 py-2 rounded-xl bg-white/10 hover:bg-white/15 border border-white/10">
        New analysis
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="relative z-10 max-w-6xl mx-auto px-4 pb-16">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="relative z-10 border-t border-white/10">
    <div class="max-w-6xl mx-auto px-4 py-6 text-sm text-slate-400 flex justify-between">
      <span>Built with FastAPI + Jinja + scikit-learn</span>
      <span class="text-slate-500">v1.0</span>
    </div>
  </footer>
</body>
</html>
