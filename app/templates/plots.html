{% extends "base.html" %}
{% block content %}

<div>
  <h1 class="text-3xl font-extrabold">Plots</h1>
  <p class="text-slate-300 mt-1">Visual exploration of the analyzed dataset.</p>
</div>

<div class="mt-6 grid gap-4">
  <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
    <h2 class="text-lg font-bold">Target Distribution</h2>
    <img class="mt-4 rounded-2xl border border-white/10"
         src="{{ data.plots.target_plot }}" alt="Target distribution">
  </div>

  {% if data.plots.heatmap %}
  <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
    <h2 class="text-lg font-bold">Correlation Heatmap</h2>
    <img class="mt-4 rounded-2xl border border-white/10"
         src="{{ data.plots.heatmap }}" alt="Correlation heatmap">
  </div>
  {% endif %}

  {% if data.plots.feature_importance_plot %}
  <div class="rounded-3xl border border-white/10 bg-white/5 p-6">
    <h2 class="text-lg font-bold">Feature Importance Chart</h2>
    <img class="mt-4 rounded-2xl border border-white/10"
         src="{{ data.plots.feature_importance_plot }}" alt="Feature importance chart">
  </div>
  {% endif %}
</div>

{% endblock %}
